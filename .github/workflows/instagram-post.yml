name: Instagram Auto-Post

on:
  schedule:
    - cron: '0 8 * * 1,3,5'  # Mon, Wed, Fri at 8am UTC
    - cron: '0 8 * * 0'      # Sun at 8am UTC
    - cron: '0 18 * * 0'     # Sun at 6pm UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false  # Don't download image files — we only need filenames
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Post next photo to Instagram
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: node scripts/instagram-post.js

      - name: Commit updated queue
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add post-queue.json
          git diff --staged --quiet || git commit -m "chore: update Instagram post queue [skip ci]"
          git push
